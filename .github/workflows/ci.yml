# Plan 0b CI: lint, type-check, redaction test, build images.
# Eval gates arrive in Plan 3.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.0"

      - name: Install Python
        run: uv python install 3.12

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: Mypy
        working-directory: backend
        run: uv run mypy app/domain

      - name: Redaction test (brief requirement, CI-blocking)
        working-directory: backend
        run: uv run pytest tests/unit/test_redaction.py -v

      - name: Other unit tests
        working-directory: backend
        run: uv run pytest tests/unit -v

  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t handle-backend ./backend
      - name: Build modelserver image
        run: docker build -t handle-modelserver ./modelserver
      - name: Build chatbot image
        run: docker build -t handle-chatbot ./chatbot
      - name: Build widget image
        run: docker build -t handle-widget ./widget
      - name: Build demo host image
        run: docker build -t handle-host ./demo/host

  classification-eval:
    runs-on: ubuntu-latest
    # Eval needs the trained model weights in MinIO and a real Groq key. Only runs on
    # merges to main or PRs whose commit message contains [eval], so PRs stay fast.
    if: >-
      contains(github.event.head_commit.message, '[eval]') ||
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Configure .env for CI
        env:
          VAULT_ROOT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN || 'dev-root-token' }}
        run: |
          cp .env.example .env
          sed -i "s|^VAULT_ROOT_TOKEN=.*|VAULT_ROOT_TOKEN=$VAULT_ROOT_TOKEN|" .env

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for vault to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T vault sh -c "VAULT_ADDR=http://vault:8200 vault status >/dev/null 2>&1"; then
              echo "vault is up"
              break
            fi
            echo "waiting for vault... ($i/30)"
            sleep 5
          done

      - name: Wait for vault-init to seed kv mounts
        run: |
          for i in $(seq 1 20); do
            if docker compose ps vault-init --status exited | grep -q vault-init; then
              echo "vault-init finished"
              break
            fi
            echo "waiting for vault-init... ($i/20)"
            sleep 5
          done

      - name: Set real secrets in Vault
        env:
          VAULT_ROOT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          : "${VAULT_ROOT_TOKEN:?VAULT_ROOT_TOKEN secret is not set in repo settings}"
          : "${GROQ_API_KEY:?GROQ_API_KEY secret is not set in repo settings}"
          : "${GH_PAT:?GH_PAT secret is not set in repo settings}"
          JWT_KEY="$(openssl rand -hex 64)"
          echo "VAULT_ROOT_TOKEN length=${#VAULT_ROOT_TOKEN}"
          echo "GROQ_API_KEY length=${#GROQ_API_KEY}"
          echo "GH_PAT length=${#GH_PAT}"
          # Build the seed script as a one-line string and pipe it directly via printf
          printf '%s\n' \
            'set -e' \
            'export VAULT_ADDR=http://vault:8200' \
            "export VAULT_TOKEN='$VAULT_ROOT_TOKEN'" \
            'echo "in-container token length=${#VAULT_TOKEN}"' \
            "vault kv put secret/jwt signing_key='$JWT_KEY'" \
            "vault kv put secret/llm groq_api_key='$GROQ_API_KEY'" \
            "vault kv put secret/github personal_access_token='$GH_PAT'" \
            | docker compose exec -T vault sh
          docker compose restart api modelserver
          sleep 60

      - name: Wait for api + modelserver healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T api sh -c "curl -fsS http://localhost:8000/health >/dev/null 2>&1" \
            && docker compose exec -T modelserver sh -c "curl -fsS http://localhost:8001/health >/dev/null 2>&1"; then
              echo "api + modelserver healthy"
              break
            fi
            echo "waiting for api+modelserver... ($i/30)"
            sleep 10
          done

      - name: Run combined eval (classification + RAG)
        run: docker compose exec -T api uv run python /app/evals/run_all.py
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "===== docker compose ps ====="
          docker compose ps -a
          echo "===== api logs ====="
          docker compose logs --tail=200 api || true
          echo "===== modelserver logs ====="
          docker compose logs --tail=200 modelserver || true
          echo "===== vault logs ====="
          docker compose logs --tail=100 vault || true
          echo "===== vault-init logs ====="
          docker compose logs --tail=100 vault-init || true
          echo "===== migrate logs ====="
          docker compose logs --tail=200 migrate || true
          echo "===== classifier-restore logs ====="
          docker compose logs --tail=200 classifier-restore || true
          echo "===== dataset-fetch logs ====="
          docker compose logs --tail=400 dataset-fetch || true
          echo "===== docs-fetch logs ====="
          docker compose logs --tail=400 docs-fetch || true
          echo "===== corpus-ingest logs ====="
          docker compose logs --tail=200 corpus-ingest || true
          echo "===== minio-init logs ====="
          docker compose logs --tail=100 minio-init || true

      - name: Tear down
        if: always()
        run: docker compose down -v
