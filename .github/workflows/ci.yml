# Plan 0b CI: lint, type-check, redaction test, build images.
# Eval gates arrive in Plan 3.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.0"

      - name: Install Python
        run: uv python install 3.12

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: Mypy
        working-directory: backend
        run: uv run mypy app/domain

      - name: Redaction test (brief requirement, CI-blocking)
        working-directory: backend
        run: uv run pytest tests/unit/test_redaction.py -v

      - name: Other unit tests
        working-directory: backend
        run: uv run pytest tests/unit -v

  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t handle-backend ./backend
      - name: Build modelserver image
        run: docker build -t handle-modelserver ./modelserver
      - name: Build chatbot image
        run: docker build -t handle-chatbot ./chatbot
      - name: Build widget image
        run: docker build -t handle-widget ./widget
      - name: Build demo host image
        run: docker build -t handle-host ./demo/host
